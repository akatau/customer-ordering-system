name: Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      revision:
        description: 'Git revision to deploy (branch/tag/commit)'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.inputs.revision || github.ref }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push Docker image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: customer-ordering-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Update Kubernetes deployment
      env:
        CLUSTER_NAME: customer-ordering-${{ github.event.inputs.environment }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: customer-ordering-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
        kubectl set image deployment/backend-api backend-api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n production
        kubectl rollout status deployment/backend-api -n production --timeout=5m

    - name: Run database migrations
      env:
        DATABASE_URL: ${{ secrets[format('DATABASE_URL_{0}', github.event.inputs.environment)] }}
      run: |
        pip install alembic sqlalchemy psycopg2-binary
        cd backend
        alembic upgrade head

    - name: Verify deployment health
      run: |
        HEALTH_URL=${{ secrets[format('HEALTH_CHECK_URL_{0}', github.event.inputs.environment)] }}
        for i in {1..30}; do
          if curl -f $HEALTH_URL; then
            echo "Health check passed"
            exit 0
          fi
          echo "Attempt $i: Health check failed, retrying..."
          sleep 10
        done
        echo "Health check failed after 30 attempts"
        exit 1

    - name: Notify Slack on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Backend deployed to ${{ github.event.inputs.environment }} successfully'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: Notify Slack on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Backend deployment to ${{ github.event.inputs.environment }} failed'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: Rollback on failure
      if: failure()
      run: |
        echo "Initiating rollback..."
        kubectl rollout undo deployment/backend-api -n production
        kubectl rollout status deployment/backend-api -n production --timeout=5m
